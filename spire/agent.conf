agent {
    data_dir       = ".spire/data/agent"
    log_level      = "INFO"
    server_address = "127.0.0.1"
    server_port    = "8081"
    socket_path    = "/tmp/spire-agent/public/api.sock"
    trust_domain       = "example.org"
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }
    KeyManager "memory" {
        plugin_data {}
    }
    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
